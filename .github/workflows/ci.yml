name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run build
      - run: ./dist/relay --version
      - run: npm pack
      - run: tar -xzf aksharp5-relay-*.tgz -C /tmp
      - run: /tmp/package/dist/relay --version
