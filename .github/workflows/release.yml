name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Validate release source
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="$(jq -r .version package.json)"
          [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]
          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            [[ "$GITHUB_REF_NAME" == "v$version" ]]
            git merge-base --is-ancestor "$GITHUB_SHA" origin/main
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

  check:
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.10
      - run: bun install --frozen-lockfile
      - run: bun run check

  compatibility:
    uses: ./.github/workflows/compat-latest.yml
    permissions:
      contents: read

  build:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: bun-linux-x64-baseline
            asset: linux-x64-gnu
          - runner: ubuntu-24.04-arm
            target: bun-linux-arm64
            asset: linux-arm64-gnu
          - runner: macos-15-intel
            target: bun-darwin-x64
            asset: darwin-x64
          - runner: macos-15
            target: bun-darwin-arm64
            asset: darwin-arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.10
      - run: bun install --frozen-lockfile
      - run: bun run test
      - name: Build native artifact
        env:
          TARGET: ${{ matrix.target }}
        run: bun scripts/build.ts "$TARGET" dist/release/relay
      - name: Smoke test
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          test "$(dist/release/relay --version)" = "$VERSION"
          dist/release/relay --help >/dev/null
      - name: Package
        env:
          ASSET: ${{ matrix.asset }}
          VERSION: ${{ needs.validate.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          root="relay-v${VERSION}-${ASSET}"
          mkdir -p "dist/package/$root" dist/artifacts
          install -m 0755 dist/release/relay "dist/package/$root/relay"
          cp README.md LICENSE SECURITY.md "dist/package/$root/"
          cp -R docs "dist/package/$root/docs"
          export COPYFILE_DISABLE=1
          tar -C dist/package -czf "dist/artifacts/$root.tar.gz" "$root"
          verify_dir="$(mktemp -d)"
          trap 'rm -rf "$verify_dir"' EXIT
          tar -xzf "dist/artifacts/$root.tar.gz" -C "$verify_dir"
          test -x "$verify_dir/$root/relay"
          test -f "$verify_dir/$root/LICENSE"
          test -f "$verify_dir/$root/README.md"
          test -f "$verify_dir/$root/SECURITY.md"
          test -d "$verify_dir/$root/docs"
          test "$("$verify_dir/$root/relay" --version)" = "$VERSION"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ matrix.asset }}
          path: dist/artifacts/*.tar.gz
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  release:
    if: github.event_name == 'push'
    needs: [validate, check, compatibility, build]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: release
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd release
          sha256sum relay-*.tar.gz > SHA256SUMS
          sha256sum --check SHA256SUMS
      - name: Attest release archives
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-checksums: release/SHA256SUMS
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" release/* \
            --repo "$GITHUB_REPOSITORY" \
            --draft \
            --verify-tag \
            --generate-notes \
            --title "Relay $GITHUB_REF_NAME"
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --draft=false
