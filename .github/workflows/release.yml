name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: Version whose existing vX.Y.Z tag should be rebuilt after a failed release.
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.version != '' && format('refs/tags/v{0}', inputs.version) || github.sha }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.10
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run build
      - run: test "$(./dist/relay --version)" = "$(jq -r .version package.json)"

  compatibility:
    uses: ./.github/workflows/compat-latest.yml
    with:
      ref: ${{ github.event_name == 'workflow_dispatch' && inputs.version != '' && format('refs/tags/v{0}', inputs.version) || github.sha }}
    permissions:
      contents: read

  release_please:
    needs: [check, compatibility]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      ref: ${{ steps.context.outputs.ref }}
      release_created: ${{ steps.context.outputs.release_created }}
      version: ${{ steps.context.outputs.version }}
    steps:
      - id: release
        if: inputs.version == ''
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: release-please-manifest.json
      - name: Validate recovery version
        if: inputs.version != ''
        env:
          VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: inputs.version != ''
        with:
          persist-credentials: false
          ref: refs/tags/v${{ inputs.version }}
      - id: context
        env:
          RECOVERY_VERSION: ${{ inputs.version }}
          RELEASE_CREATED: ${{ steps.release.outputs.release_created }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          if [ -n "$RECOVERY_VERSION" ]; then
            test "$(jq -r .version package.json)" = "$RECOVERY_VERSION"
            echo "release_created=true" >> "$GITHUB_OUTPUT"
            echo "version=$RECOVERY_VERSION" >> "$GITHUB_OUTPUT"
            echo "ref=refs/tags/v$RECOVERY_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "release_created=$RELEASE_CREATED" >> "$GITHUB_OUTPUT"
            echo "version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
            if [ "$RELEASE_CREATED" = true ]; then
              echo "ref=refs/tags/v$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
            fi
          fi

  build_native:
    needs: release_please
    if: needs.release_please.outputs.release_created == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: bun-linux-x64-baseline
            asset: linux-x64-gnu
            package: "@akshar5/relay-linux-x64-gnu"
          - runner: ubuntu-24.04-arm
            target: bun-linux-arm64
            asset: linux-arm64-gnu
            package: "@akshar5/relay-linux-arm64-gnu"
          - runner: macos-15-intel
            target: bun-darwin-x64
            asset: darwin-x64
            package: "@akshar5/relay-darwin-x64"
          - runner: macos-15
            target: bun-darwin-arm64
            asset: darwin-arm64
            package: "@akshar5/relay-darwin-arm64"
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ needs.release_please.outputs.ref }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
      - run: bun install --frozen-lockfile
      - name: Build native executable
        env:
          TARGET: ${{ matrix.target }}
        run: bun scripts/build.ts "$TARGET" dist/native/relay
      - name: Smoke test native executable
        env:
          VERSION: ${{ needs.release_please.outputs.version }}
        run: |
          test "$(dist/native/relay --version)" = "$VERSION"
          dist/native/relay --help >/dev/null
      - name: Assemble and inspect npm package
        env:
          ASSET: ${{ matrix.asset }}
          PACKAGE_NAME: ${{ matrix.package }}
          VERSION: ${{ needs.release_please.outputs.version }}
        run: |
          mkdir -p dist/tarballs
          bun scripts/package-npm.ts native "$ASSET" dist/native/relay dist/npm-package
          npm pack ./dist/npm-package --pack-destination dist/tarballs --json > dist/pack.json
          test "$(jq -r 'length' dist/pack.json)" = 1
          test "$(jq -r '.[0].name' dist/pack.json)" = "$PACKAGE_NAME"
          test "$(jq -r '.[0].version' dist/pack.json)" = "$VERSION"
          test "$(jq -r '.[0].files[] | select(.path == "bin/relay") | .mode' dist/pack.json)" = 493
          verify_dir="$(mktemp -d)"
          trap 'rm -rf "$verify_dir"' EXIT
          tar -xzf "dist/tarballs/$(jq -r '.[0].filename' dist/pack.json)" -C "$verify_dir"
          test "$("$verify_dir/package/bin/relay" --version)" = "$VERSION"
          "$verify_dir/package/bin/relay" --help >/dev/null
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-${{ matrix.asset }}
          path: dist/tarballs/*.tgz
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  build_launcher:
    needs: release_please
    if: needs.release_please.outputs.release_created == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ needs.release_please.outputs.ref }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
      - run: bun install --frozen-lockfile
      - name: Assemble and inspect npm launcher
        env:
          VERSION: ${{ needs.release_please.outputs.version }}
        run: |
          mkdir -p dist/tarballs
          bun scripts/package-npm.ts launcher dist/npm-package
          npm pack ./dist/npm-package --pack-destination dist/tarballs --json > dist/pack.json
          test "$(jq -r 'length' dist/pack.json)" = 1
          test "$(jq -r '.[0].name' dist/pack.json)" = "@akshar5/relay"
          test "$(jq -r '.[0].version' dist/pack.json)" = "$VERSION"
          test "$(jq -r '.[0].files[] | select(.path == "bin/relay") | .mode' dist/pack.json)" = 493
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-launcher
          path: dist/tarballs/*.tgz
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  publish:
    needs: [release_please, build_native, build_launcher]
    if: needs.release_please.outputs.release_created == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: npm-*
          path: artifacts
          merge-multiple: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
      - run: npm install --global npm@11.17.0
      - name: Verify release set
        env:
          VERSION: ${{ needs.release_please.outputs.version }}
        run: |
          test "$(find artifacts -name '*.tgz' -type f | wc -l | tr -d ' ')" = 5
          test -f "artifacts/akshar5-relay-${VERSION}.tgz"
          test -f "artifacts/akshar5-relay-darwin-arm64-${VERSION}.tgz"
          test -f "artifacts/akshar5-relay-darwin-x64-${VERSION}.tgz"
          test -f "artifacts/akshar5-relay-linux-arm64-gnu-${VERSION}.tgz"
          test -f "artifacts/akshar5-relay-linux-x64-gnu-${VERSION}.tgz"
      - name: Install and run the packed release
        env:
          VERSION: ${{ needs.release_please.outputs.version }}
        run: |
          prefix="$(mktemp -d)"
          trap 'rm -rf "$prefix"' EXIT
          npm install --global --prefix "$prefix" --ignore-scripts \
            "./artifacts/akshar5-relay-linux-x64-gnu-${VERSION}.tgz" \
            "./artifacts/akshar5-relay-${VERSION}.tgz"
          test "$("$prefix/bin/relay" --version)" = "$VERSION"
          "$prefix/bin/relay" --help >/dev/null
      - name: Publish native packages, then launcher
        env:
          VERSION: ${{ needs.release_please.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          publish_package() {
            local name=$1
            local tarball=$2
            local local_integrity
            local remote_integrity
            local_integrity="sha512-$(openssl dgst -sha512 -binary "$tarball" | openssl base64 -A)"
            if remote_integrity=$(npm view "${name}@${VERSION}" dist.integrity 2>/dev/null); then
              test "$remote_integrity" = "$local_integrity"
              echo "$name@$VERSION already matches this artifact"
              return
            fi
            npm publish "$tarball" --access public --provenance
          }

          publish_package "@akshar5/relay-darwin-arm64" "artifacts/akshar5-relay-darwin-arm64-${VERSION}.tgz"
          publish_package "@akshar5/relay-darwin-x64" "artifacts/akshar5-relay-darwin-x64-${VERSION}.tgz"
          publish_package "@akshar5/relay-linux-arm64-gnu" "artifacts/akshar5-relay-linux-arm64-gnu-${VERSION}.tgz"
          publish_package "@akshar5/relay-linux-x64-gnu" "artifacts/akshar5-relay-linux-x64-gnu-${VERSION}.tgz"
          publish_package "@akshar5/relay" "artifacts/akshar5-relay-${VERSION}.tgz"
